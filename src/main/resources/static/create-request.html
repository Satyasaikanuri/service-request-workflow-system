<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Request - Service Portal</title>

    <link rel="stylesheet" href="css/styles.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>

        :root {
            --bg-user: #0f172a;
            --nav-user: rgba(15, 23, 42, 0.95);
            --text-user: #f8fafc;
            --card-bg: #1e293b;
            --border-color: rgba(255, 255, 255, 0.05);
            --text-muted: #94a3b8;
            --input-bg: #0f172a;
            --input-border: #334155;
        }

        body.user-theme {
            background: var(--bg-user);
            color: var(--text-user);
        }

        .top-navbar {
            background: var(--nav-user);
            border-bottom: 1px solid var(--border-color);
            padding: 0 2rem;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .form-card {
            background: var(--card-bg);
            border-radius: 12px;
            max-width: 800px;
            margin: 2rem auto;
            overflow: hidden;
        }

        .form-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-color);
        }

        .form-body {
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem;
            border-radius: 6px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: white;
        }

        .btn {
            padding: 0.75rem 2rem;
            border-radius: 6px;
            cursor: pointer;
        }

    </style>
</head>

<body class="user-theme">

    <nav class="top-navbar">

        <div>
            <a href="user-dashboard.html"
                style="text-decoration:none;color:white;font-size:20px;font-weight:bold;">
                ← New Request
            </a>
        </div>

        <div id="user-name">User</div>

    </nav>

    <main style="padding:2rem;">

        <div class="form-card">

            <div class="form-header">
                <h2>Request Details</h2>
            </div>

            <div class="form-body">

                <form id="createRequestForm">

                    <div class="form-group">
                        <label class="form-label">Title</label>

                        <input
                            type="text"
                            id="req-title"
                            class="form-control"
                            required>
                    </div>

                    <div class="form-group">

                        <label class="form-label">Department</label>

                        <select
                            id="req-dept"
                            class="form-control"
                            required>

                            <option value="">Select Department</option>

                        </select>
                    </div>

                    <div class="form-group">

                        <label class="form-label">Request Type</label>

                        <select
                            id="req-type"
                            class="form-control"
                            required>

                            <option value="">Select Type</option>

                        </select>
                    </div>

                    <div class="form-group">

                        <label class="form-label">Priority</label>

                        <select
                            id="req-priority"
                            class="form-control">

                            <option value="LOW">LOW</option>
                            <option value="MEDIUM">MEDIUM</option>
                            <option value="HIGH">HIGH</option>
                            <option value="CRITICAL">CRITICAL</option>

                        </select>
                    </div>

                    <div class="form-group">

                        <label class="form-label">Description</label>

                        <textarea
                            id="req-desc"
                            rows="6"
                            class="form-control"
                            required></textarea>

                    </div>

                    <button
                        type="submit"
                        class="btn"
                        style="background:#3b82f6;color:white;border:none;">

                        Submit Request

                    </button>

                </form>

            </div>

        </div>

    </main>

    <script src="js/common.js"></script>

    <script>

        Auth.checkAuth();

        const user = Auth.getUser();

        if (user) {
            document.getElementById('user-name').innerText =
                user.username;
        }

        async function loadFormData() {

            try {

                const token =
                    localStorage.getItem("token");

                const [depts, types] =
                    await Promise.all([

                    fetch(
                        'https://service-request-workflow-system-1.onrender.com/api/common/departments',
                        {
                            headers: {
                                "Authorization":
                                    `Bearer ${token}`
                            }
                        }
                    ).then(res => res.json()),

                    fetch(
                        'https://service-request-workflow-system-1.onrender.com/api/common/request-types',
                        {
                            headers: {
                                "Authorization":
                                    `Bearer ${token}`
                            }
                        }
                    ).then(res => res.json())

                ]);

                const deptSelect =
                    document.getElementById('req-dept');

                depts.forEach(d => {

                    const opt =
                        document.createElement('option');

                    opt.value = d.id;
                    opt.innerText = d.name;

                    deptSelect.appendChild(opt);
                });

                const typeSelect =
                    document.getElementById('req-type');

                types.forEach(t => {

                    const opt =
                        document.createElement('option');

                    opt.value = t.id;
                    opt.innerText = t.name;

                    typeSelect.appendChild(opt);
                });

            } catch (e) {

                console.error(e);

                alert("Failed to load form data");
            }
        }

        document.getElementById('createRequestForm')
            .addEventListener('submit', async (e) => {

            e.preventDefault();

            const payload = {

                title:
                    document.getElementById('req-title').value,

                description:
                    document.getElementById('req-desc').value,

                departmentId:
                    document.getElementById('req-dept').value,

                requestTypeId:
                    document.getElementById('req-type').value,

                priority:
                    document.getElementById('req-priority').value
            };

            try {

                await API.post('/requests', payload);

                alert("Request Created!");

                window.location.href =
                    'user-dashboard.html';

            } catch (error) {

                alert(error.message);
            }
        });

        loadFormData();

    </script>

</body>

</html>

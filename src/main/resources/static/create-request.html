<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Request - Service Portal</title>

    <link rel="stylesheet" href="css/styles.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>

        :root {
            --bg-user: #0f172a;
            --nav-user: rgba(15, 23, 42, 0.95);
            --text-user: #f8fafc;
            --card-bg: #1e293b;
            --border-color: rgba(255, 255, 255, 0.05);
            --text-muted: #94a3b8;
            --input-bg: #0f172a;
            --input-border: #334155;
        }

        body.user-theme {
            background: var(--bg-user);
            color: var(--text-user);
        }

        .top-navbar {
            background: var(--nav-user);
            border-bottom: 1px solid var(--border-color);
            padding: 0 2rem;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .form-card {
            background: var(--card-bg);
            border-radius: 12px;
            max-width: 800px;
            margin: 2rem auto;
            overflow: hidden;
        }

        .form-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-color);
        }

        .form-body {
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem;
            border-radius: 6px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: white;
        }

        .btn {
            padding: 0.75rem 2rem;
            border-radius: 6px;
            cursor: pointer;
        }

    </style>
</head>

<body class="user-theme">

    <nav class="top-navbar">

        <div>
            <a href="user-dashboard.html"
                style="text-decoration:none;color:white;font-size:20px;font-weight:bold;">
                ← New Request
            </a>
        </div>

        <div id="user-name">User</div>

    </nav>

    <main style="padding:2rem;">

        <div class="form-card">

            <div class="form-header">
                <h2>Request Details</h2>
            </div>

            <div class="form-body">

                <form id="createRequestForm">

                    <div class="form-group">
                        <label class="form-label">Title</label>

                        <input
                            type="text"
                            id="req-title"
                            class="form-control"
                            required>
                    </div>

                    <div class="form-group">

                        <label class="form-label">Department</label>

                        <select
                            id="req-dept"
                            class="form-control"
                            required>

                            <option value="">Select Department</option>

                        </select>
                    </div>

                    <div class="form-group">

                        <label class="form-label">Request Type</label>

                        <select
                            id="req-type"
                            class="form-control"
                            required>

                            <option value="">Select Type</option>

                        </select>
                    </div>

                    <div class="form-group">

                        <label class="form-label">Priority</label>

                        <select
                            id="req-priority"
                            class="form-control">

                            <option value="LOW">LOW</option>
                            <option value="MEDIUM">MEDIUM</option>
                            <option value="HIGH">HIGH</option>
                            <option value="CRITICAL">CRITICAL</option>

                        </select>
                    </div>

                    <div class="form-group">

                        <label class="form-label">Description</label>

                        <textarea
                            id="req-desc"
                            rows="6"
                            class="form-control"
                            required></textarea>

                    </div>

                    <button
                        type="submit"
                        class="btn"
                        style="background:#3b82f6;color:white;border:none;">

                        Submit Request

                    </button>

                </form>

            </div>

        </div>

    </main>

    <script src="js/common.js"></script>

   <script>

const API_BASE_URL =
    'https://service-request-workflow-system-1.onrender.com/api';

// Check token
const token = localStorage.getItem("token");

if (!token) {
    window.location.href = "login.html";
}

// Load logged user
const user =
    JSON.parse(localStorage.getItem("user"));

if (user) {
    document.getElementById("user-name").innerText =
        user.username;
}

// Common headers
function authHeaders() {
    return {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
    };
}

// Load departments + request types
async function loadFormData() {

    try {

        const deptResponse = await fetch(
            `${API_BASE_URL}/common/departments`,
            {
                method: "GET",
                headers: authHeaders()
            }
        );

        const typeResponse = await fetch(
            `${API_BASE_URL}/common/request-types`,
            {
                method: "GET",
                headers: authHeaders()
            }
        );

        if (!deptResponse.ok || !typeResponse.ok) {
            throw new Error("Failed to load form data");
        }

        const depts = await deptResponse.json();
        const types = await typeResponse.json();

        const deptSelect =
            document.getElementById("req-dept");

        depts.forEach(dept => {

            const option =
                document.createElement("option");

            option.value = dept.id;
            option.textContent = dept.name;

            deptSelect.appendChild(option);
        });

        const typeSelect =
            document.getElementById("req-type");

        types.forEach(type => {

            const option =
                document.createElement("option");

            option.value = type.id;
            option.textContent = type.name;

            typeSelect.appendChild(option);
        });

    } catch (error) {

        console.error(error);

        alert("Error loading form data");
    }
}

// Submit request
document
    .getElementById("createRequestForm")
    .addEventListener("submit", async function (e) {

        e.preventDefault();

        const payload = {

            title:
                document.getElementById("req-title").value,

            description:
                document.getElementById("req-desc").value,

            departmentId:
                parseInt(
                    document.getElementById("req-dept").value
                ),

            requestTypeId:
                parseInt(
                    document.getElementById("req-type").value
                ),

            priority:
                document.getElementById("req-priority").value
        };

        try {

            const response = await fetch(
                `${API_BASE_URL}/requests`,
                {
                    method: "POST",
                    headers: authHeaders(),
                    body: JSON.stringify(payload)
                }
            );

            const data = await response.json();

            if (!response.ok) {

                alert(
                    data.message || "Failed to create request"
                );

                return;
            }

            alert("Request Created Successfully!");

            window.location.href =
                "user-dashboard.html";

        } catch (error) {

            console.error(error);

            alert("Server Error");
        }
    });

// Initialize
loadFormData();

</script>
</body>

</html>

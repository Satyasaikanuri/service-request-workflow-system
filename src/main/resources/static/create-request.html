<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Request - Service Portal</title>

    <link rel="stylesheet" href="css/styles.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-user: #0f172a;
            --nav-user: rgba(15, 23, 42, 0.95);
            --text-user: #f8fafc;
            --card-bg: #1e293b;
            --border-color: rgba(255, 255, 255, 0.05);
            --text-muted: #94a3b8;
            --input-bg: #0f172a;
            --input-border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body.user-theme {
            background: var(--bg-user);
            color: var(--text-user);
            font-family: Arial, sans-serif;
            min-height: 100vh;
        }

        .top-navbar {
            background: var(--nav-user);
            border-bottom: 1px solid var(--border-color);
            padding: 0 2rem;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .form-card {
            background: var(--card-bg);
            border-radius: 12px;
            max-width: 800px;
            margin: 2rem auto;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .form-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-color);
        }

        .form-body {
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 0.9rem;
            border-radius: 8px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: white;
            font-size: 15px;
        }

        .form-control:focus {
            outline: none;
            border-color: #3b82f6;
        }

        textarea.form-control {
            resize: vertical;
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            background: #3b82f6;
            color: white;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #2563eb;
        }

        @media (max-width: 768px) {

            .top-navbar {
                padding: 0 1rem;
            }

            .form-card {
                margin: 1rem;
            }

            .form-body {
                padding: 1.5rem;
            }
        }
    </style>
</head>

<body class="user-theme">

    <nav class="top-navbar">

        <div>
            <a href="user-dashboard.html"
                style="text-decoration:none;color:white;font-size:20px;font-weight:bold;">
                ← New Request
            </a>
        </div>

        <div id="user-name">User</div>

    </nav>

    <main style="padding:2rem;">

        <div class="form-card">

            <div class="form-header">
                <h2>Request Details</h2>
            </div>

            <div class="form-body">

                <form id="createRequestForm">

                    <div class="form-group">

                        <label class="form-label">Title</label>

                        <input
                            type="text"
                            id="req-title"
                            class="form-control"
                            required>

                    </div>

                    <div class="form-group">

                        <label class="form-label">Department</label>

                        <select
                            id="req-dept"
                            class="form-control"
                            required>

                            <option value="">Select Department</option>

                        </select>

                    </div>

                    <div class="form-group">

                        <label class="form-label">Request Type</label>

                        <select
                            id="req-type"
                            class="form-control"
                            required>

                            <option value="">Select Type</option>

                        </select>

                    </div>

                    <div class="form-group">

                        <label class="form-label">Priority</label>

                        <select
                            id="req-priority"
                            class="form-control">

                            <option value="LOW">LOW</option>
                            <option value="MEDIUM">MEDIUM</option>
                            <option value="HIGH">HIGH</option>
                            <option value="CRITICAL">CRITICAL</option>

                        </select>

                    </div>

                    <div class="form-group">

                        <label class="form-label">Description</label>

                        <textarea
                            id="req-desc"
                            rows="6"
                            class="form-control"
                            required></textarea>

                    </div>

                    <button
                        type="submit"
                        class="btn">

                        Submit Request

                    </button>

                </form>

            </div>

        </div>

    </main>

<script>

const token = localStorage.getItem("token");

if (!token) {

    window.location.href = "login.html";
}

const user =
    JSON.parse(localStorage.getItem("user"));

if (user) {

    document.getElementById("user-name").innerText =
        user.username;
}

function authHeaders() {

    return {

        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
    };
}

async function loadFormData() {

    try {

        const deptResponse = await fetch(
            "https://service-request-workflow-system-1.onrender.com/api/departments",
            {
                method: "GET",
                headers: authHeaders()
            }
        );

        const typeResponse = await fetch(
            "https://service-request-workflow-system-1.onrender.com/api/request-types",
            {
                method: "GET",
                headers: authHeaders()
            }
        );

        const depts =
            await deptResponse.json();

        const types =
            await typeResponse.json();

        console.log("Departments:", depts);
        console.log("Types:", types);

        const deptSelect =
            document.getElementById("req-dept");

        deptSelect.innerHTML =
            '<option value="">Select Department</option>';

        depts.forEach(dept => {

            const option =
                document.createElement("option");

            option.value = dept.id;
            option.textContent = dept.name;

            deptSelect.appendChild(option);
        });

        const typeSelect =
            document.getElementById("req-type");

        typeSelect.innerHTML =
            '<option value="">Select Type</option>';

        types.forEach(type => {

            const option =
                document.createElement("option");

            option.value = type.id;
            option.textContent = type.name;

            typeSelect.appendChild(option);
        });

    } catch (error) {

        console.error(error);

        alert("Error loading form data");
    }
}

document
    .getElementById("createRequestForm")
    .addEventListener("submit", async function (e) {

        e.preventDefault();

        const payload = {

            title:
                document.getElementById("req-title").value,

            description:
                document.getElementById("req-desc").value,

            departmentId:
                parseInt(
                    document.getElementById("req-dept").value
                ),

            requestTypeId:
                parseInt(
                    document.getElementById("req-type").value
                ),

            priority:
                document.getElementById("req-priority").value
        };

        try {

            const response = await fetch(
                "https://service-request-workflow-system-1.onrender.com/api/requests",
                {
                    method: "POST",
                    headers: authHeaders(),
                    body: JSON.stringify(payload)
                }
            );

            const data =
                await response.json();

            if (!response.ok) {

                alert(
                    data.message ||
                    "Failed to create request"
                );

                return;
            }

            alert("Request Created Successfully!");

            window.location.href =
                "user-dashboard.html";

        } catch (error) {

            console.error(error);

            alert("Server Error");
        }
    });

loadFormData();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard - Service Portal</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-manager: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.05);
            --accent-blue: #3b82f6;
        }

        body {
            background: var(--bg-manager);
            color: var(--text-main);
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        .layout-wrapper {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: #0f172a;
            border-right: 1px solid var(--border-color);
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .main-panel {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
        }

        .top-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            text-align: left;
            padding: 0.75rem;
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
        }

        .data-table td {
            padding: 1rem 0.75rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
        }

        .btn-assign {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-assign:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .selectable-row {
            cursor: pointer;
            transition: background 0.2s;
        }

        .selectable-row:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .selected {
            background: rgba(59, 130, 246, 0.1) !important;
            border-left: 3px solid var(--accent-blue);
        }

        .badge {
            padding: 0.25rem 0.6rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-available {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 1.5rem;
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border-color);
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="layout-wrapper">
        <aside class="sidebar">
            <div style="padding: 2rem; border-bottom: 1px solid var(--border-color);">
                <div
                    style="color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; margin-bottom: 0.5rem;">
                    Manager Portal</div>
                <div style="font-weight: 800; font-size: 1.2rem;">Service Portal</div>
            </div>
            <nav style="padding: 1.5rem 1rem;">
                <a href="#" class="nav-item active"
                    style="display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; border-radius: 0.5rem; color: #fff; text-decoration: none; background: rgba(255,255,255,0.05);">
                    <i class="fas fa-laptop"></i> Laptop Assignment
                </a>
            </nav>
        </aside>

        <main class="main-panel">
            <header class="top-navbar">
                <div>
                    <h1 style="font-size: 1.5rem; margin: 0;">Manager Dashboard</h1>
                    <p style="color: var(--text-muted); font-size: 0.9rem; margin: 0.25rem 0 0 0;">Assign hardware to
                        new employees</p>
                </div>
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <span id="manager-name" style="font-weight: 600;">Manager</span>
                    <button onclick="Auth.logout()"
                        style="background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer;">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </header>

            <div class="dashboard-grid">
                <!-- New Users Table -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            <i class="fas fa-users" style="color: var(--accent-blue);"></i>
                            New Users (Unassigned)
                        </div>
                    </div>
                    <div style="max-height: 500px; overflow-y: auto;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>User</th>
                                    <th>Email</th>
                                    <th>Selection</th>
                                </tr>
                            </thead>
                            <tbody id="users-tbody">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Available Laptops Table -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            <i class="fas fa-laptop-medical" style="color: #10b981;"></i>
                            Available Laptops
                        </div>
                    </div>
                    <div style="max-height: 500px; overflow-y: auto;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Model</th>
                                    <th>Serial Number</th>
                                    <th>Selection</th>
                                </tr>
                            </thead>
                            <tbody id="laptops-tbody">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div style="margin-top: 2rem; display: flex; justify-content: flex-end;">
                <button id="assign-btn" class="btn-assign"
                    style="padding: 1rem 3rem; font-size: 1rem; border-radius: 0.75rem;" disabled>
                    <i class="fas fa-link"></i> Assign Selected Laptop
                </button>
            </div>
        </main>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirm-modal" class="modal">
        <div class="modal-content">
            <i class="fas fa-check-circle" style="font-size: 3rem; color: #10b981; margin-bottom: 1.5rem;"></i>
            <h2 id="modal-msg" style="margin-bottom: 1rem;">Assignment Successful</h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">The laptop has been successfully linked to the
                user record.</p>
            <button onclick="location.reload()" class="btn-assign" style="width: 100%;">Excellent</button>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/manager-dashboard.js"></script>
</body>

</html>
